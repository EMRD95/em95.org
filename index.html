<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>em95</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 2.5rem;
    }
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    li a {
      display: block;
      padding: 0.9rem 2.5rem;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #c0c0c0;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    li a:hover {
      border-color: #555;
      color: #fff;
      background: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body>
  <main>
    <h1>em95</h1>
    <ul>
      <li><a href="https://keyboardrage.em95.org">KeyboardRage</a></li>
      <li><a href="https://drivestat.em95.org">DriveStat</a></li>
      <li><a href="https://touchgrass.em95.org">TouchGrass</a></li>
    </ul>
  </main>
</body>
</html>
